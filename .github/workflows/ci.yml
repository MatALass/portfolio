name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, format & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run check

  build:
    name: Vite production build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - name: Verify dist output
        run: |
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          echo "Build OK — dist contents:"
          find dist -type f | sort
